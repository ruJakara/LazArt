    - "плановые учения"
    - "квартира"
    - "подъезд"
    - "бытовой"
    - "домашний"
    - "автомобиль"
    - "машина столкнулась"

# --- Scoring Weights ---
weights:
  oil_gas: 6
  chem_industry: 5
  infrastructure: 3  # ЖКХ на 3-е место
  accident: 3
  repair: 2
  industrial: 2
  negative: -5
  stage_early: 1
  stage_late: -1
  tenders: 3

# --- Geography ---
geography:
  priority_regions:
    - KhMAO_YANAO    # ⭐⭐⭐⭐⭐
    - Tyumen         # ⭐⭐⭐⭐⭐
    - Siberia        # ⭐⭐⭐⭐
    - Yakutia        # ⭐⭐⭐
    - Irkutsk        # ⭐⭐⭐
  priority_bonus: 2

  city_to_region:
    "Йошкар-Ола": "Марий Эл"
    "Калининград": "Калининградская область"
    "Маршала Захарова": "СПб"
  priority_regions:
    - Sverdlovsk
    - Chelyabinsk
    - Perm
    - HMAO
  priority_bonus: 1

# --- Thresholds ---
thresholds:
  filter1_to_llm: 4
  llm_relevance: 0.6
  llm_urgency: 3

