# --- Keywords for Filter Level 1 ---
keywords:
  positive:
    accident:
      - "авария"
      - "прорыв"
      - "утечка"
      - "порыв"
      - "остановка"
      - "вышел из строя"
      - "ЧП"
      - "чрезвычайная ситуация"
      - "аварийный"
      - "отключение"
      - "без воды"
      - "без тепла"
      - "без света"
      - "затопление"
      - "разрушение"
    repair:
      - "ремонт"
      - "срочный ремонт"
      - "капремонт"
      - "капитальный ремонт"
      - "замена"
      - "реконструкция"
      - "модернизация"
      - "восстановление"
    infrastructure:
      - "водоканал"
      - "насосная станция"
      - "КНС"
      - "ВНС"
      - "котельная"
      - "теплосети"
      - "очистные сооружения"
      - "водопровод"
      - "канализация"
      - "теплотрасса"
      - "трубопровод"
      - "коллектор"
      - "ТЭЦ"
      - "электросети"
      - "газопровод"
    industrial:
      - "цех"
      - "агрегат"
      - "производство"
      - "простой"
      - "технологический сбой"
      - "остановка производства"
  negative:
    - "ДТП"
    - "дорожно-транспортное происшествие"
    - "ремонт дороги"
    - "ремонт моста"
    - "дорожные работы"
    - "учения"
    - "тренировка"
    - "условная авария"
    - "плановые учения"
    - "квартира"
    - "подъезд"
    - "бытовой"
    - "домашний"
    - "автомобиль"
    - "машина столкнулась"

# --- Scoring Weights ---
weights:
  accident: 3
  repair: 2
  infrastructure: 4
  industrial: 2
  negative: -5

# --- Thresholds ---
thresholds:
  filter1_to_llm: 4
  llm_relevance: 0.6
  llm_urgency: 3

