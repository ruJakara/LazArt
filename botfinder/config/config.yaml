# --- Scoring Weights ---
weights:
  oil_gas: 6
  chem_industry: 5
  production: 6
  accident: 3
  repair: 2
  infrastructure: 4
  industrial: 2
  stage_early: 1
  stage_late: -1
  # tenders: 3  # DISABLED
  negative: -5

# --- Thresholds ---
thresholds:
  filter1_to_llm: 2
  llm_relevance: 0.6
  llm_urgency: 3

# --- Limits ---
limits:
  max_signals_per_day: 10
  max_processing_batch: 100

# --- Geography Scoring ---
geography:
  city_to_region:
    "Йошкар-Ола": "Марий Эл"
    "Калининград": "Калининградская область"
    "Маршала Захарова": "СПб"
    "Норильск": "Красноярский край"
    "Магнитогорск": "Челябинская область"
    "Нижний Тагил": "Свердловская область"
    "Сургут": "ХМАО"
    "Нижневартовск": "ХМАО"
    "Новый Уренгой": "ЯНАО"
    "Ноябрьск": "ЯНАО"
  priority_regions:
    - Sverdlovsk
    - Chelyabinsk
    - Perm
    - HMAO
    - YANAO
    - Krasnoyarsk
    - Irkutsk
    - Novosibirsk
  priority_bonus: 1

# --- Filter1 Gate (combo rule) ---
filter1_gate:
  require_combo_to_llm: true
  event_categories_required:
    - accident
    - repair
    - oil_gas
    - chem_industry
    - production
    - stage_early
    # - tenders  # DISABLED
  object_categories_required:
    - infrastructure
    - industrial
    - oil_gas
    - chem_industry
    - production
    - tenders
  strong_event_override_enabled: true
  strong_event_override_phrases:
    - "авария на водоканале"
    - "прорыв трубопровода"
    - "отключение отопления"
    - "затопление"
    - "ЧП на объекте"
    - "массовое отключение"
    - "разлив нефти"
    - "взрыв на производстве"
    - "обрушение"
    - "пожар на объекте"
    - "авария на производстве"
    - "затопление шахты"
    - "остановка НПЗ"
    - "ГНВП"

